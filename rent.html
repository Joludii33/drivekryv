<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформлення оренди - DriveKRYV</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Ідеальна сітка, яка не розтягує нижні блоки */
        .rent-grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        /* Адаптивність для мобілок */
        @media (max-width: 768px) {
            .rent-grid-layout { grid-template-columns: 1fr; }
            .grid-card-1 { grid-column: 1 !important; grid-row: 1 !important; }
            .grid-card-2 { grid-column: 1 !important; grid-row: 2 !important; }
            .grid-card-3 { grid-column: 1 !important; grid-row: 3 !important; }
            .grid-card-4 { grid-column: 1 !important; grid-row: 4 !important; }
        }
        
        /* Анімація модального вікна */
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        #btn-modal-ok:hover { opacity: 0.9; }

        /* Стилі для тижневого календаря */
        .cal-cell { padding: 10px 5px; border-radius: 8px; font-size: 14px; font-weight: 600; transition: 0.2s; display: flex; align-items: center; justify-content: center; user-select: none; }
        .cal-cell.free { background: #fff; border: 1px solid #ddd; color: #333; cursor: pointer; }
        .cal-cell.free:hover { border-color: #51BBED; }
        .cal-cell.booked { background: #eaeaea; color: #aaa; cursor: not-allowed; text-decoration: line-through; border: 1px solid transparent; }
        .cal-cell.selected { background: #51BBED; color: #fff; box-shadow: 0 4px 10px rgba(81,187,237,0.3); cursor: pointer; border: 1px solid #51BBED; }
        .cal-day-name { font-weight: bold; color: #999; margin-bottom: 5px; font-size: 12px; }
    </style>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f7f6; overflow-y: auto !important; height: auto !important;">

    <header style="display: flex; justify-content: flex-end; align-items: center; background-color: #51BBED; padding: 15px 40px; width: 100%; box-sizing: border-box; margin: 0;">
        <button class="btn-back" onclick="window.history.back()" style="background: transparent; color: white; border: 1px solid white; padding: 8px 16px; border-radius: 20px; cursor: pointer;"> < Назад</button>
    </header>

    <main class="rent-page-container" style="padding: 40px; max-width: 1100px; margin: 0 auto;">
        <h1 class="rent-main-title" style="text-align: center; margin-top: 0; margin-bottom: 30px;">Оформлення оренди авто</h1>

        <div class="rent-grid-layout">
            
            <div class="rent-card grid-card-1" style="grid-column: 1; grid-row: 1; background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); display: flex; flex-direction: column;">
                <h2 class="rent-card-title" style="margin-top: 0; margin-bottom: 20px;">1. Автомобіль та дати</h2>
                
                <div class="rent-car-preview" style="display: flex; align-items: center; gap: 20px; margin-bottom: 20px;">
                    <img id="rent-car-image" src="" alt="" style="width: 140px; aspect-ratio: 4/3; object-fit: cover; border-radius: 12px; display: block; margin: 0;">
                    <h3 id="rent-car-name" style="margin: 0; font-size: 22px; text-align: left; flex: 1;">Завантаження...</h3>
                </div>

                <div style="background: #f9f9f9; padding: 15px; border-radius: 15px; margin-top: auto;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                        <button id="btn-prev-week" style="background: white; border: 1px solid #ddd; padding: 5px 15px; border-radius: 8px; cursor: pointer; font-weight: bold;">❮</button>
                        <h4 id="week-label" style="margin: 0; font-size: 14px; color: #333;">Травень 2026</h4>
                        <button id="btn-next-week" style="background: white; border: 1px solid #ddd; padding: 5px 15px; border-radius: 8px; cursor: pointer; font-weight: bold;">❯</button>
                    </div>
                    <div id="week-grid" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center;">
                        </div>
                </div>
            </div>

            <div class="rent-card grid-card-2" style="grid-column: 1; grid-row: 2; background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); display: flex; flex-direction: column;">
                <h2 class="rent-card-title" style="margin-top: 0; margin-bottom: 20px;">2. Ваші дані</h2>
                <div class="rent-input-group" style="margin-bottom: 15px;">
                    <label style="display: block; font-size: 14px; margin-bottom: 5px;">ПІБ</label>
                    <input type="text" id="rent-user-name" class="rent-input" placeholder="Введіть дані" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;">
                </div>
                <div class="rent-input-group" style="margin-top: auto;">
                    <label style="display: block; font-size: 14px; margin-bottom: 5px;">Номер телефону</label>
                    <input type="tel" class="rent-input" placeholder="+380..." style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;">
                </div>
            </div>

            <div class="rent-card grid-card-3" style="grid-column: 2; grid-row: 1; background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); display: flex; flex-direction: column;">
                <h2 class="rent-card-title" style="margin-top: 0; margin-bottom: 20px;">3. Логістика</h2>
                <div class="rent-radio-group" style="margin-bottom: 15px; display: flex; gap: 20px;">
                    <label><input type="radio" name="delivery" value="office" checked> В офісі</label>
                    <label><input type="radio" name="delivery" value="address"> Доставка</label>
                </div>
                <div class="rent-input-group" style="margin-bottom: 15px;">
                    <label style="display: block; font-size: 14px; margin-bottom: 5px;">Адреса або коментар</label>
                    <input type="text" id="rent-address" class="rent-input" placeholder="Введіть дані" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;">
                </div>
                <div class="rent-input-group" style="margin-top: auto;">
                    <label style="display: block; font-size: 14px; margin-bottom: 5px;">Коментар до оренди</label>
                    <input type="text" id="rent-comment" class="rent-input" placeholder="Введіть дані" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;">
                </div>
            </div>

            <div class="rent-card grid-card-4" style="grid-column: 2; grid-row: 2; background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); display: flex; flex-direction: column;">
                <h2 class="rent-card-title" style="margin-top: 0; margin-bottom: 20px;">4. Підтвердження</h2>
                <div class="rent-summary" style="background: #f9f9f9; padding: 15px; border-radius: 12px; margin-bottom: 20px;">
                    <p id="rent-calc-text" style="margin: 5px 0; font-size: 14px; line-height: 1.6;">Оберіть дати в календарі</p>
                    <p class="rent-total" id="rent-total-price" style="font-size: 20px; font-weight: 700; color: #51BBED; margin: 15px 0 0 0;">Разом: 0 грн</p>
                </div>
                <button id="btn-confirm-rent" style="width: 100%; background: #51BBED; color: white; border: none; padding: 15px; border-radius: 25px; font-size: 16px; font-weight: 600; cursor: not-allowed; opacity: 0.5; margin-top: auto;" disabled>Підтвердити замовлення</button>
            </div>

        </div>
    </main>

    <div id="success-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); z-index: 9999; align-items: center; justify-content: center;">
        <div style="background: #fff; padding: 40px; border-radius: 24px; text-align: center; max-width: 400px; width: 90%; box-shadow: 0 10px 40px rgba(0,0,0,0.2); animation: popIn 0.3s ease-out;">
            <h2 style="margin: 0 0 15px; font-size: 26px; color: #111;">Замовлення оформлено!</h2>
            <p style="margin: 0 0 30px; font-size: 16px; color: #666; line-height: 1.5;">Ваша заявка успішно прийнята.</p>
            <button id="btn-modal-ok" style="background: #51BBED; color: #fff; border: none; padding: 15px 30px; border-radius: 20px; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; transition: opacity 0.2s;">Супер!</button>
        </div>
    </div>

    <script src="cars.js"></script>
    <script src="main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const carId = urlParams.get('id');
            const car = carsData.find(c => c.id === carId);
            const confirmBtn = document.getElementById('btn-confirm-rent');

            if (!car || !confirmBtn) return;

            document.getElementById('rent-car-name').textContent = `${car.brand} ${car.model}`;
            document.getElementById('rent-car-image').src = car.imageMain;

            // ==========================================
            // 1. ЛОГІКА ТИЖНЕВОГО КАЛЕНДАРЯ
            // ==========================================
            
            const tempSavedDates = JSON.parse(localStorage.getItem(`temp_rent_dates_${car.id}`) || '[]');
            window.selectedDates = [...tempSavedDates];

            let staticBooked = car.bookedDates || ['2026-05-18', '2026-05-19', '2026-05-25']; 
            let userBooked = JSON.parse(localStorage.getItem(`userBookings_${car.id}`) || '[]');
            let bookedDates = [...staticBooked, ...userBooked];

            const monthNames = ["Січ", "Лют", "Бер", "Кві", "Тра", "Чер", "Лип", "Сер", "Вер", "Жов", "Лис", "Гру"];
            
            let todayDate = new Date();
            todayDate.setHours(0,0,0,0);
            let currentWeekStart = new Date(todayDate);
            let dayOfWeek = currentWeekStart.getDay();
            let diffToMonday = currentWeekStart.getDate() - dayOfWeek + (dayOfWeek === 0 ? -6 : 1);
            currentWeekStart.setDate(diffToMonday);

            function formatDate(d) {
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            }

            function renderWeek() {
                const grid = document.getElementById('week-grid');
                const label = document.getElementById('week-label');
                
                label.textContent = `${monthNames[currentWeekStart.getMonth()]} ${currentWeekStart.getFullYear()}`;
                
                let html = `<div class="cal-day-name">Пн</div><div class="cal-day-name">Вт</div><div class="cal-day-name">Ср</div><div class="cal-day-name">Чт</div><div class="cal-day-name">Пт</div><div class="cal-day-name">Сб</div><div class="cal-day-name">Нд</div>`;
                
                for(let i = 0; i < 7; i++) {
                    let d = new Date(currentWeekStart);
                    d.setDate(d.getDate() + i);
                    let dateStr = formatDate(d);
                    
                    let isBooked = bookedDates.includes(dateStr);
                    let isSelected = window.selectedDates.includes(dateStr);
                    let isPast = d < todayDate;

                    let classes = "cal-cell";
                    if (isBooked || isPast) classes += " booked";
                    else if (isSelected) classes += " selected";
                    else classes += " free";

                    html += `<div class="${classes}" data-date="${dateStr}" ${(!isBooked && !isPast) ? 'onclick="toggleRentDate(this)"' : ''}>${d.getDate()}</div>`;
                }
                grid.innerHTML = html;
            }

            window.toggleRentDate = function(el) {
                let dateStr = el.getAttribute('data-date');
                if (window.selectedDates.includes(dateStr)) {
                    window.selectedDates = window.selectedDates.filter(d => d !== dateStr);
                } else {
                    window.selectedDates.push(dateStr);
                }
                renderWeek();
                calculatePrice();
            };

            document.getElementById('btn-prev-week').addEventListener('click', () => {
                currentWeekStart.setDate(currentWeekStart.getDate() - 7);
                renderWeek();
            });

            document.getElementById('btn-next-week').addEventListener('click', () => {
                currentWeekStart.setDate(currentWeekStart.getDate() + 7);
                renderWeek();
            });

            // ==========================================
            // 2. КАЛЬКУЛЯТОР ТА ПІДТВЕРДЖЕННЯ
            // ==========================================
            function calculatePrice() {
                const diffDays = window.selectedDates.length;
                
                if (diffDays === 0) {
                    document.getElementById('rent-calc-text').innerHTML = `Оберіть вільні дати в календарі вище.`;
                    document.getElementById('rent-total-price').textContent = `Разом: 0 грн`;
                    confirmBtn.disabled = true;
                    confirmBtn.style.opacity = '0.5';
                    confirmBtn.style.cursor = 'not-allowed';
                    return null;
                }

                confirmBtn.disabled = false;
                confirmBtn.style.opacity = '1';
                confirmBtn.style.cursor = 'pointer';

                const insurance = 100;
                const carTotal = car.priceDay * diffDays;
                let grandTotal = carTotal + insurance;

                document.getElementById('rent-calc-text').innerHTML = `${car.brand} ${car.model} x ${diffDays} дн. = ${carTotal} грн <br>Страхування = 100 грн`;
                document.getElementById('rent-total-price').textContent = `Разом: ${grandTotal} грн`;
                
                return { diffDays, grandTotal };
            }

            renderWeek();
            calculatePrice();

            confirmBtn.addEventListener('click', () => {
                const stats = calculatePrice();
                if(!stats) return;
                
                const addressInput = document.getElementById('rent-address');
                const commentInput = document.getElementById('rent-comment');
                const deliveryRadio = document.querySelector('input[name="delivery"]:checked');
                const userNameInput = document.getElementById('rent-user-name');
                
                window.selectedDates.sort();
                let firstDate = window.selectedDates[0];
                let lastDate = window.selectedDates[window.selectedDates.length - 1];

                const rentalOrder = {
                    id: Date.now(),
                    carId: car.id,
                    carName: `${car.brand} ${car.model}`,
                    image: car.imageMain,
                    date: firstDate,
                    endDate: lastDate,
                    rentedDates: window.selectedDates,
                    days: stats.diffDays,
                    total: stats.grandTotal,
                    delivery: deliveryRadio ? deliveryRadio.value : 'office',
                    address: addressInput ? addressInput.value : 'Не вказано',
                    comment: commentInput ? commentInput.value : '',
                    customerName: userNameInput ? userNameInput.value : 'Гість',
                    status: 'Очікує підтвердження'
                };

                let history = JSON.parse(localStorage.getItem('history_guest') || '[]');
                history.unshift(rentalOrder);
                localStorage.setItem('history_guest', JSON.stringify(history));

let globalBookings = JSON.parse(localStorage.getItem(`userBookings_${car.id}`) || '[]');
globalBookings = [...globalBookings, ...window.selectedDates];
localStorage.setItem(`userBookings_${car.id}`, JSON.stringify(globalBookings));

                localStorage.removeItem(`temp_rent_dates_${car.id}`);

                const modal = document.getElementById('success-modal');
                if (modal) {
                    modal.style.display = 'flex';
                    document.getElementById('btn-modal-ok').onclick = () => {
                        window.location.href = 'index.html';
                    };
                } else {
                    window.location.href = 'index.html';
                }
            });
        });
    </script>
</body>
</html>
